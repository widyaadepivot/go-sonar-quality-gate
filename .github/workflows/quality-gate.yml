on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

name: Quality Gate
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
    - name: Download and verify dependencies
      run: go mod download -x && go mod verify
    - name: Run unit tests
      run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
    - name: Upload test covergae
      uses: actions/upload-artifact@v7
      with:
        name: unit-tests-coverage
        path: ./coverage.out
        retention-days: 1

  golangci-lint:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.11
        args: --issues-exit-code=0 --output.checkstyle.path=./golangci-lint.xml
    - name: Upload golangci-lint result
      uses: actions/upload-artifact@v7
      with:
        name: golangci-lint-result
        path: ./golangci-lint.xml
        retention-days: 1
    - id: evaluate
      name: Evaluate golangci-lint result
      run: |
        if [ ! -f ./golangci-lint.xml ]; then
          echo "::error::golangci-lint.xml not found"
          exit 1
        fi

        ERROR_COUNT=$(grep -c '<error ' ./golangci-lint.xml || true)
        FILE_COUNT=$(grep -c '<file ' ./golangci-lint.xml || true)

        echo "issue_count=$ERROR_COUNT" >> "$GITHUB_OUTPUT"
        echo "file_count=$FILE_COUNT" >> "$GITHUB_OUTPUT"

        if [ "$ERROR_COUNT" -gt 0 ]; then
          echo "::error::$ERROR_COUNT lint issue(s) found in $FILE_COUNT file(s)"
          exit 1
        else
          echo "::notice::No lint issues found"
        fi
    - name: Comment golangci-lint result on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const issueCount = process.env.ISSUE_COUNT;
          const fileCount = process.env.FILE_COUNT;
          const summaryFile = process.env.SUMMARY_FILE;

          let body = `## golangci-lint Result\n\n`;
          body += `- **Files with issues:** ${fileCount}\n`;
          body += `- **Total issues:** ${issueCount}\n\n`;

          if (Number(issueCount) > 0) {
            body += `### Issues\n`;
            body += `| File | Line | Message | Severity |\n`;
            body += `|------|------|---------|----------|\n`;

            const fs = require('fs');
            const xml = fs.readFileSync('./golangci-lint.xml', 'utf8');
            const lines = xml.split('\n');
            let currentFile = '';
            for (const line of lines) {
              const fileMatch = line.match(/<file [^>]*name="([^"]*)"/);
              if (fileMatch) currentFile = fileMatch[1];
              const errorMatch = line.match(/<error [^>]*line="([^"]*)"[^>]*message="([^"]*)"[^>]*severity="([^"]*)"/);
              if (errorMatch) {
                body += `| ${currentFile} | ${errorMatch[1]} | ${errorMatch[2]} | ${errorMatch[3]} |\n`;
              }
            }
            body += `\n> **${issueCount} lint issue(s) found in ${fileCount} file(s)**`;
          } else {
            body += `No issues found. :white_check_mark:`;
          }

          // Find existing comment to update
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c =>
            c.user.login === 'github-actions[bot]' &&
            c.body.startsWith('## golangci-lint Result')
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
      env:
        ISSUE_COUNT: ${{ steps.evaluate.outputs.issue_count }}
        FILE_COUNT: ${{ steps.evaluate.outputs.file_count }}

  sonarqube:
    if: always()
    needs:
      - unit-tests
      - golangci-lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Download test coverage
      uses: actions/download-artifact@v8
      with:
        name: unit-tests-coverage
    - name: Download golangci-lint result
      uses: actions/download-artifact@v8
      with:
        name: golangci-lint-result
    - name: Sonarqube scanner
      uses: sonarsource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    - id: sonarqube-quality-gate-check
      name: Sonarqube quality gate check
      uses: sonarsource/sonarqube-quality-gate-action@master
      with:
        pollingTimeoutSec: 600
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    - name: Sonarqube quality gate result
      run: echo "The Quality Gate status is ${{ steps.sonarqube-quality-gate-check.outputs.quality-gate-status }}"
