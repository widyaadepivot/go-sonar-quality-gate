on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

name: Quality Gate
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
    - name: Download and verify dependencies
      run: go mod download -x && go mod verify
    - name: Run unit tests
      run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
    - name: Upload test covergae
      uses: actions/upload-artifact@v7
      with:
        name: unit-tests-coverage
        path: ./coverage.out
        retention-days: 1

  golangci-lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.11
        args: --issues-exit-code=0 --output.checkstyle.path=./golangci-lint.xml
    - name: Upload golangci-lint result
      uses: actions/upload-artifact@v7
      with:
        name: golangci-lint-result
        path: ./golangci-lint.xml
        retention-days: 1
    - name: Evaluate golangci-lint result
      run: |
        if [ ! -f ./golangci-lint.xml ]; then
          echo "::error::golangci-lint.xml not found"
          exit 1
        fi

        ERROR_COUNT=$(grep -c '<error ' ./golangci-lint.xml || true)
        FILE_COUNT=$(grep -c '<file ' ./golangci-lint.xml || true)

        echo "issue_count=$ERROR_COUNT" >> "$GITHUB_OUTPUT"
        echo "file_count=$FILE_COUNT" >> "$GITHUB_OUTPUT"

        echo "## golangci-lint Summary" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Files with issues:** $FILE_COUNT" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Total issues:** $ERROR_COUNT" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"

        if [ "$ERROR_COUNT" -gt 0 ]; then
          echo "### Issues" >> "$GITHUB_STEP_SUMMARY"
          echo '| File | Line | Message | Severity |' >> "$GITHUB_STEP_SUMMARY"
          echo '|------|------|---------|----------|' >> "$GITHUB_STEP_SUMMARY"
          # Parse checkstyle XML: track current <file name="..."> for each <error>
          CURRENT_FILE=""
          while IFS= read -r line; do
            if echo "$line" | grep -q '<file '; then
              CURRENT_FILE=$(echo "$line" | sed -n 's/.*name="\([^"]*\)".*/\1/p')
            elif echo "$line" | grep -q '<error '; then
              LINE_NUM=$(echo "$line" | sed -n 's/.*line="\([^"]*\)".*/\1/p')
              MESSAGE=$(echo "$line" | sed -n 's/.*message="\([^"]*\)".*/\1/p')
              SEVERITY=$(echo "$line" | sed -n 's/.*severity="\([^"]*\)".*/\1/p')
              echo "| $CURRENT_FILE | $LINE_NUM | $MESSAGE | $SEVERITY |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done < ./golangci-lint.xml
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "::error::$ERROR_COUNT lint issue(s) found in $FILE_COUNT file(s)"
          exit 1
        else
          echo "No issues found." >> "$GITHUB_STEP_SUMMARY"
          echo "::notice::No lint issues found"
        fi

  sonarqube:
    needs:
      - unit-tests
      - golangci-lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Download test coverage
      uses: actions/download-artifact@v8
      with:
        name: unit-tests-coverage
    - name: Download golangci-lint result
      uses: actions/download-artifact@v8
      with:
        name: golangci-lint-result
    - name: Sonarqube scanner
      uses: sonarsource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    - id: sonarqube-quality-gate-check
      name: Sonarqube quality gate check
      uses: sonarsource/sonarqube-quality-gate-action@master
      with:
        pollingTimeoutSec: 600
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    - name: Sonarqube quality gate result
      run: echo "The Quality Gate status is ${{ steps.sonarqube-quality-gate-check.outputs.quality-gate-status }}"
