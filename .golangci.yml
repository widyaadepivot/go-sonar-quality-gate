version: "2"

linters:
  enable: 
    - revive
    - gosec
    - staticcheck
    - errcheck
    - gocyclo
    - govet
    - unused
    - ineffassign
    - bodyclose
    - prealloc
    - misspell
    - gocritic
    - modernize
    - dupl
    - spancheck
    - sqlclosecheck
    - testpackage
    - unqueryvet
    - usestdlibvars
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - revive
      - path-except: _test\.go
        linters:
          - forbidigo
  settings:
    revive:
      enable-default-rules: true
      rules:
        - name: package-comments
          disabled: true
    testpackage:
      skip-regexp: "(export|internal)_test\\.go"
      allow-packages:
        - main

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
    - golines
